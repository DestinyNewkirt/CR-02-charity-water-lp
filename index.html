<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charity Water Landing Page</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f2f2f2;
      color: #111;
    }

    /* HEADER */
    header {
      background: #e7ddc6;
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'Poppins', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 3px;
    }

    .donate-btn {
      background: #f7941d;
      color: white;
      border: none;
      padding: 0.7rem 1.2rem;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
    }

    /* HERO SECTION */
    .hero {
      background: #111;
      color: white;
      padding: 4rem 2rem;
    }

    .hero-container {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    .hero-text h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 3rem;
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }

    .hero-text p {
      color: #ddd;
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      max-width: 500px;
    }

    /* EMAIL BOX */
    .subscribe-box {
      display: flex;
      max-width: 500px;
      background: #e9e9e9;
      border-radius: 10px;
      overflow: hidden;
    }

    .subscribe-box input {
      flex: 1;
      border: none;
      padding: 1rem;
      font-size: 1rem;
      background: transparent;
      outline: none;
    }

    .subscribe-box button {
      background: #f7941d;
      color: white;
      border: none;
      padding: 0 1.5rem;
      font-size: 1rem;
      cursor: pointer;
    }

    .hero-image img {
      width: 100%;
      border-radius: 6px;
    }

    /* DESKTOP */
    @media (min-width: 768px) {
      .hero-container {
        flex-direction: row;
        align-items: center;
      }

      .hero-text {
        flex: 1;
      }

      .hero-image {
        flex: 1;
      }
    }

  </style>
</head>
<body>

  <header>
    <div class="logo">charity: water</div>
    <button class="donate-btn">Donate Now</button>
  </header>

  <section class="hero">
    <div class="hero-container">

      <div class="hero-text">
        <h1>Clean Water for Everyone, Everywhere</h1>
        <p>
          We believe access to water is a basic human right. Help us build a future where no one has to drink dirty water.
        </p>

        <div class="subscribe-box">
          <input type="email" placeholder="enter email to learn more" />
          <button>Subscribe</button>
        </div>
      </div>

      <div class="hero-image">
        <img src="CHW.jpg" alt="Children using a water pump">
      </div>

    </div>
  </section>

</body>
</html>
